{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "notes-app.fullname" . }}-ingress
  labels:
    {{- include "notes-app.labels" . | nindent 4 }}
  annotations:
{{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /auth(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ include "notes-app.fullname" . }}-auth-service
            port:
              number: {{ .Values.service.auth.port }}
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ include "notes-app.fullname" . }}-backend-service
            port:
              number: {{ .Values.service.backend.port }}
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ include "notes-app.fullname" . }}-frontend-service
            port:
              number: {{ .Values.service.frontend.port }}
{{- end }}
