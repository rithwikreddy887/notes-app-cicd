name: Notes App CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            auth/package-lock.json
            backend/package-lock.json

      - name: Install auth dependencies
        working-directory: auth
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run auth unit tests
        working-directory: auth
        run: npm test

      - name: Run backend unit tests
        working-directory: backend
        run: npm test

      - name: Test frontend file exists
        run: test -f frontend/index.html

      # ---------- Docker Builds ----------
      - name: Build auth Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notes-auth:latest ./auth

      - name: Build backend Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notes-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notes-frontend:latest ./frontend

      # ---------- Trivy Security Scanning ----------
      - name: Scan auth image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/notes-auth:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/notes-backend:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/notes-frontend:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      # ---------- DockerHub Login ----------
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------- Push Images ----------
      - name: Push auth image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/notes-auth:latest

      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/notes-backend:latest

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/notes-frontend:latest