name: Notes App CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            auth/package-lock.json
            backend/package-lock.json

      - name: Install auth dependencies
        working-directory: auth
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run auth unit tests
        working-directory: auth
        run: npm test

      - name: Run backend unit tests
        working-directory: backend
        run: npm test

      - name: Test frontend file exists
        run: test -f frontend/index.html

      - name: Build auth Docker image
        run: docker build -t notes-auth:test ./auth

      - name: Build backend Docker image
        run: docker build -t notes-backend:test ./backend

      - name: Build frontend Docker image
        run: docker build -t notes-frontend:test ./frontend

      - name: Scan auth image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: notes-auth:test
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: notes-backend:test
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: notes-frontend:test
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL