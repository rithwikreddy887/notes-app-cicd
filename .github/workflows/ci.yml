name: Notes App CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  AUTH_IMAGE: ${{ vars.AUTH_IMAGE }}
  BACKEND_IMAGE: ${{ vars.BACKEND_IMAGE }}
  FRONTEND_IMAGE: ${{ vars.FRONTEND_IMAGE }}
  IMAGE_TAG: ${{ vars.IMAGE_TAG }}

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            auth/package-lock.json
            backend/package-lock.json

      - name: Install auth dependencies
        working-directory: auth
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run auth unit tests
        working-directory: auth
        run: npm test

      - name: Run backend unit tests
        working-directory: backend
        run: npm test

      - name: Test frontend file exists
        run: test -f frontend/index.html

      - name: Build auth Docker image
        run: docker build -t $DOCKERHUB_USERNAME/$AUTH_IMAGE:$IMAGE_TAG ./auth

      - name: Build backend Docker image
        run: docker build -t $DOCKERHUB_USERNAME/$BACKEND_IMAGE:$IMAGE_TAG ./backend

      - name: Build frontend Docker image
        run: docker build -t $DOCKERHUB_USERNAME/$FRONTEND_IMAGE:$IMAGE_TAG ./frontend

      - name: Scan auth image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ env.AUTH_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push auth image
        run: docker push $DOCKERHUB_USERNAME/$AUTH_IMAGE:$IMAGE_TAG

      - name: Push backend image
        run: docker push $DOCKERHUB_USERNAME/$BACKEND_IMAGE:$IMAGE_TAG

      - name: Push frontend image
        run: docker push $DOCKERHUB_USERNAME/$FRONTEND_IMAGE:$IMAGE_TAG