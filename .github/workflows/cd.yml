name: Notes App CD Pipeline

on:
  workflow_run:
    workflows:
      - Notes App CI Pipeline
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify kubectl access
        run: kubectl get nodes

      - name: Verify Helm
        run: helm version

      - name: Deploy Notes App using Helm
        run: |
          helm upgrade --install notes-app ./helm/notes-app \
            --set image.auth.repository=${{ vars.DOCKERHUB_USERNAME }}/${{ vars.AUTH_IMAGE }} \
            --set image.auth.tag=${{ vars.IMAGE_TAG }} \
            --set image.backend.repository=${{ vars.DOCKERHUB_USERNAME }}/${{ vars.BACKEND_IMAGE }} \
            --set image.backend.tag=${{ vars.IMAGE_TAG }} \
            --set image.frontend.repository=${{ vars.DOCKERHUB_USERNAME }}/${{ vars.FRONTEND_IMAGE }} \
            --set image.frontend.tag=${{ vars.IMAGE_TAG }} \
            --set config.mongoHost=notes-app-notes-app-mongo-service \
            --set secret.mongoUsername=${{ secrets.MONGO_USERNAME }} \
            --set secret.mongoPassword=${{ secrets.MONGO_PASSWORD }} \
            --set mongodb.env.rootUsername=${{ secrets.MONGO_USERNAME }} \
            --set mongodb.env.rootPassword=${{ secrets.MONGO_PASSWORD }}

      - name: Restart auth deployment
        run: kubectl rollout restart deploy notes-app-notes-app-auth-deploy

      - name: Restart backend deployment
        run: kubectl rollout restart deploy notes-app-notes-app-backend-deploy

      - name: Verify Helm release
        run: helm status notes-app

      - name: Verify deployed pods
        run: kubectl get pods